<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d0d">
<title>Gym Tracker 💪</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: rgba(255,255,255,0.08);
  --accent: #c8ff00;
  --accent2: #7b5ea7;
  --text: #f0f0f0;
  --muted: #666;
  --me: #c8ff00;
  --dam: #b388ff;
  --danger: #ff4d4d;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overscroll-behavior:none}
h1,h2,h3,.display{font-family:'Bebas Neue',sans-serif;letter-spacing:.04em}

/* Layout */
.app{max-width:480px;margin:0 auto;padding-bottom:90px}
header{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:flex-end;justify-content:space-between}
.logo{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.06em;line-height:1}
.logo span{color:var(--accent)}
.duo{display:flex;gap:8px;align-items:center;margin-top:.35rem}
.duo-badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.duo-me{background:rgba(200,255,0,.12);color:var(--me);border:1px solid rgba(200,255,0,.25)}
.duo-dam{background:rgba(179,136,255,.12);color:var(--dam);border:1px solid rgba(179,136,255,.25)}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);display:flex;max-width:480px;margin:0 auto}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 14px;cursor:pointer;color:var(--muted);font-size:11px;font-weight:500;transition:color .15s;border:none;background:none}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;margin:1rem 1.25rem 0;overflow:hidden}
.card-header{padding:.85rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.card-body{padding:1rem 1.1rem}

/* Muscle pills */
.muscle-grid{display:flex;flex-wrap:wrap;gap:7px;padding:1rem 1.25rem}
.mpill{padding:7px 14px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .15s}
.mpill.active{background:rgba(200,255,0,.12);border-color:rgba(200,255,0,.4);color:var(--accent)}

/* Date picker */
.date-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:15px;color:var(--text);font-family:'DM Sans',sans-serif}
.date-input:focus{outline:none;border-color:rgba(200,255,0,.4)}

/* Exercise rows */
.ex-row{display:grid;grid-template-columns:1fr 80px 80px 36px;gap:6px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.ex-row:last-child{border-bottom:none}
.ex-name{font-size:14px;font-weight:400;color:var(--text);line-height:1.3}
.weight-col{display:flex;flex-direction:column;align-items:center;gap:3px}
.col-head{font-size:10px;font-weight:600;letter-spacing:.06em}
.col-me{color:var(--me)}
.col-dam{color:var(--dam)}
.w-input{width:76px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 4px;font-size:15px;font-weight:500;text-align:center;color:var(--text);font-family:'DM Sans',sans-serif;-moz-appearance:textfield}
.w-input::-webkit-outer-spin-button,.w-input::-webkit-inner-spin-button{-webkit-appearance:none}
.w-input:focus{outline:none;border-color:rgba(200,255,0,.4)}
.w-input.me-inp:focus{border-color:rgba(200,255,0,.5)}
.w-input.dam-inp:focus{border-color:rgba(179,136,255,.5)}
.del-btn{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:color .15s}
.del-btn:hover{color:var(--danger)}

/* Add exercise */
.add-row{display:flex;gap:8px;margin-top:12px}
.add-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif}
.add-input:focus{outline:none;border-color:rgba(200,255,0,.4)}
.add-input::placeholder{color:var(--muted)}
.add-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--accent);font-size:20px;cursor:pointer;line-height:1;transition:background .15s}
.add-btn:hover{background:#252525}

/* Save button */
.save-btn{display:block;width:calc(100% - 2.5rem);margin:1.25rem auto 0;background:var(--accent);color:#000;border:none;border-radius:12px;padding:15px;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.08em;cursor:pointer;transition:opacity .15s}
.save-btn:hover{opacity:.9}
.save-btn:active{transform:scale(.98)}

/* History */
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin:1rem 1.25rem 0;overflow:hidden}
.session-head{padding:.9rem 1.1rem;display:flex;justify-content:space-between;align-items:flex-start}
.session-date{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:.04em;color:var(--text)}
.session-muscle{font-size:12px;color:var(--muted);margin-top:2px}
.session-del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;line-height:1}
.session-table{width:100%;border-collapse:collapse;font-size:13px}
.session-table th{padding:7px 12px;text-align:left;font-size:11px;letter-spacing:.07em;font-weight:600;background:var(--surface2);color:var(--muted)}
.session-table td{padding:8px 12px;border-top:1px solid var(--border)}
.session-table td:nth-child(2){color:var(--me);font-weight:500}
.session-table td:nth-child(3){color:var(--dam);font-weight:500}
.win-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.win-me{background:rgba(200,255,0,.12);color:var(--me)}
.win-dam{background:rgba(179,136,255,.12);color:var(--dam)}
.win-tie{background:rgba(255,255,255,.07);color:var(--muted)}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 1.25rem;margin-top:1rem}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.04em;line-height:1}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px}
.stat-box.me .stat-num{color:var(--me)}
.stat-box.dam .stat-num{color:var(--dam)}
.pr-table{width:100%;border-collapse:collapse;font-size:13px}
.pr-table th{padding:7px 12px;text-align:left;font-size:11px;letter-spacing:.07em;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border)}
.pr-table td{padding:9px 12px;border-bottom:1px solid var(--border)}
.pr-table tr:last-child td{border-bottom:none}
.pr-table td:nth-child(2){color:var(--me);font-weight:500}
.pr-table td:nth-child(3){color:var(--dam);font-weight:500}

/* Section spacing */
.section-gap{height:1rem}

/* Empty state */
.empty{text-align:center;padding:3rem 1.5rem;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:1rem}
.empty-text{font-size:15px;line-height:1.6}

/* Toast */
.toast{position:fixed;top:1.25rem;left:50%;transform:translateX(-50%) translateY(-120px);background:var(--accent);color:#000;padding:10px 20px;border-radius:10px;font-weight:600;font-size:14px;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Tabs content */
.tab-content{display:none}
.tab-content.active{display:block}
</style>
</head>
<body>

<div id="toast" class="toast">✓ Sesión guardada</div>

<div class="app">
  <header>
    <div class="header-top">
      <div>
        <div class="logo">GYM<span>TRACK</span></div>
      </div>
    </div>
    <div class="duo">
      <div class="duo-badge duo-me">Yo</div>
      <span style="color:var(--muted);font-size:12px">vs</span>
      <div class="duo-badge duo-dam">Damián</div>
    </div>
  </header>

  <!-- TAB: REGISTRAR -->
  <div id="tab-registro" class="tab-content active">

    <div style="padding:1rem 1.25rem 0">
      <div class="card-title" style="margin-bottom:8px">Fecha</div>
      <input type="date" class="date-input" id="fecha" />
    </div>

    <div style="padding:1rem 1.25rem 0">
      <div class="card-title" style="margin-bottom:8px">Grupo muscular</div>
    </div>
    <div class="muscle-grid" id="muscle-pills">
      <div class="mpill active" onclick="selectMuscle(this,'Pecho')">🫁 Pecho</div>
      <div class="mpill" onclick="selectMuscle(this,'Espalda')">🦾 Espalda</div>
      <div class="mpill" onclick="selectMuscle(this,'Piernas')">🦵 Piernas</div>
      <div class="mpill" onclick="selectMuscle(this,'Hombros')">🏔️ Hombros</div>
      <div class="mpill" onclick="selectMuscle(this,'Brazos')">💪 Brazos</div>
      <div class="mpill" onclick="selectMuscle(this,'Full Body')">⚡ Full Body</div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Ejercicios</span>
        <div style="display:flex;gap:16px">
          <span style="font-size:11px;font-weight:600;color:var(--me);letter-spacing:.06em">YO</span>
          <span style="font-size:11px;font-weight:600;color:var(--dam);letter-spacing:.06em">DAM</span>
          <span style="width:36px"></span>
        </div>
      </div>
      <div class="card-body" style="padding-top:.5rem;padding-bottom:.5rem">
        <div id="exercise-list"></div>
        <div class="add-row">
          <input class="add-input" id="new-ex" type="text" placeholder="Agregar ejercicio..." onkeydown="if(event.key==='Enter')addExercise()" />
          <button class="add-btn" onclick="addExercise()">+</button>
        </div>
      </div>
    </div>

    <button class="save-btn" onclick="guardarSesion()">Guardar sesión</button>
    <div class="section-gap"></div>
  </div>

  <!-- TAB: HISTORIAL -->
  <div id="tab-historial" class="tab-content">
    <div id="historial-content"></div>
  </div>

  <!-- TAB: STATS -->
  <div id="tab-stats" class="tab-content">
    <div id="stats-content"></div>
  </div>
</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <button class="nav-item active" onclick="showTab('registro')">
    <span class="nav-icon">🏋️</span>
    <span>Registrar</span>
  </button>
  <button class="nav-item" onclick="showTab('historial')">
    <span class="nav-icon">📋</span>
    <span>Historial</span>
  </button>
  <button class="nav-item" onclick="showTab('stats')">
    <span class="nav-icon">📊</span>
    <span>Stats</span>
  </button>
</div>

<script>
const EXERCISES = {
  'Pecho':    ['Press banca plano','Press banca inclinado','Aperturas con mancuerna','Fondos en paralelas','Pec deck / mariposa','Press banca declinado'],
  'Espalda':  ['Dominadas','Remo con barra','Jalón al pecho','Remo sentado en polea','Pullover con mancuerna','Remo con mancuerna'],
  'Piernas':  ['Sentadilla','Prensa de piernas','Extensiones de cuádriceps','Curl femoral','Peso muerto rumano','Pantorrillas de pie'],
  'Hombros':  ['Press militar con barra','Press Arnold','Elevaciones laterales','Pájaro / posteriores','Remo al mentón','Face pulls'],
  'Brazos':   ['Curl con barra','Curl con mancuerna','Martillo','Tríceps en polea','Rompecráneos','Press francés'],
  'Full Body': ['Peso muerto','Sentadilla','Press banca plano','Dominadas','Press militar con barra','Peso muerto rumano']
};

let currentMuscle = 'Pecho';
let exercises = [];
let sessions = JSON.parse(localStorage.getItem('gymtrack_sessions') || '[]');

function init() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('fecha').value = today;
  loadExercises(currentMuscle);
}

function selectMuscle(el, muscle) {
  document.querySelectorAll('.mpill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  currentMuscle = muscle;
  loadExercises(muscle);
}

function loadExercises(muscle) {
  exercises = (EXERCISES[muscle] || []).map(name => ({ name, me: '', dam: '' }));
  renderExercises();
}

function renderExercises() {
  const list = document.getElementById('exercise-list');
  list.innerHTML = exercises.map((ex, i) => `
    <div class="ex-row">
      <div class="ex-name">${ex.name}</div>
      <div class="weight-col">
        <input class="w-input me-inp" type="number" min="0" step="0.5" inputmode="decimal"
          value="${ex.me}" placeholder="kg"
          onchange="exercises[${i}].me=this.value" />
      </div>
      <div class="weight-col">
        <input class="w-input dam-inp" type="number" min="0" step="0.5" inputmode="decimal"
          value="${ex.dam}" placeholder="kg"
          onchange="exercises[${i}].dam=this.value" />
      </div>
      <button class="del-btn" onclick="removeEx(${i})">✕</button>
    </div>
  `).join('');
}

function addExercise() {
  const inp = document.getElementById('new-ex');
  const name = inp.value.trim();
  if (!name) return;
  exercises.push({ name, me: '', dam: '' });
  inp.value = '';
  renderExercises();
  // Scroll to bottom of list
  document.getElementById('exercise-list').lastElementChild?.scrollIntoView({ behavior: 'smooth' });
}

function removeEx(i) {
  exercises.splice(i, 1);
  renderExercises();
}

function guardarSesion() {
  const fecha = document.getElementById('fecha').value;
  if (!fecha) { alert('Elegí una fecha'); return; }

  // Read current DOM values
  const rows = document.querySelectorAll('.ex-row');
  rows.forEach((row, i) => {
    const inputs = row.querySelectorAll('input[type=number]');
    exercises[i].me = inputs[0].value;
    exercises[i].dam = inputs[1].value;
  });

  const filled = exercises.filter(e => e.me || e.dam);
  if (!filled.length) { alert('Ingresá al menos un peso'); return; }

  const session = {
    id: Date.now(),
    fecha,
    muscle: currentMuscle,
    exercises: filled.map(e => ({ ...e }))
  };

  sessions.unshift(session);
  localStorage.setItem('gymtrack_sessions', JSON.stringify(sessions));
  showToast('✓ Sesión guardada 💪');
  loadExercises(currentMuscle);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  const idx = ['registro','historial','stats'].indexOf(tab);
  document.querySelectorAll('.nav-item')[idx].classList.add('active');
  if (tab === 'historial') renderHistorial();
  if (tab === 'stats') renderStats();
}

function formatFecha(f) {
  const [y, m, d] = f.split('-');
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

function renderHistorial() {
  const el = document.getElementById('historial-content');
  if (!sessions.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🏋️</div><div class="empty-text">No hay sesiones todavía.<br>¡A entrenar!</div></div>`;
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="session-card">
      <div class="session-head">
        <div>
          <div class="session-date">${formatFecha(s.fecha)}</div>
          <div class="session-muscle">${s.muscle}</div>
        </div>
        <button class="session-del" onclick="deleteSession(${s.id})">🗑</button>
      </div>
      <table class="session-table">
        <thead>
          <tr>
            <th>Ejercicio</th>
            <th style="color:var(--me)">Yo</th>
            <th style="color:var(--dam)">Damián</th>
            <th>👑</th>
          </tr>
        </thead>
        <tbody>
          ${s.exercises.map(ex => {
            const me = parseFloat(ex.me) || 0;
            const dam = parseFloat(ex.dam) || 0;
            let badge = '';
            if (me && dam) {
              if (me > dam) badge = '<span class="win-badge win-me">Yo</span>';
              else if (dam > me) badge = '<span class="win-badge win-dam">Damián</span>';
              else badge = '<span class="win-badge win-tie">Empate</span>';
            }
            return `<tr>
              <td>${ex.name}</td>
              <td>${ex.me || '-'}</td>
              <td>${ex.dam || '-'}</td>
              <td>${badge}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `).join('');
}

function deleteSession(id) {
  if (!confirm('¿Eliminar esta sesión?')) return;
  sessions = sessions.filter(s => s.id !== id);
  localStorage.setItem('gymtrack_sessions', JSON.stringify(sessions));
  renderHistorial();
}

function renderStats() {
  const el = document.getElementById('stats-content');
  if (!sessions.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Registrá sesiones para ver estadísticas.</div></div>`;
    return;
  }

  let meWins = 0, damWins = 0, ties = 0, total = 0;
  const prMe = {}, prDam = {};
  const muscleCount = {};

  sessions.forEach(s => {
    muscleCount[s.muscle] = (muscleCount[s.muscle] || 0) + 1;
    s.exercises.forEach(ex => {
      const me = parseFloat(ex.me) || 0;
      const dam = parseFloat(ex.dam) || 0;
      if (me && dam) {
        total++;
        if (me > dam) meWins++;
        else if (dam > me) damWins++;
        else ties++;
      }
      if (me && (!prMe[ex.name] || me > prMe[ex.name])) prMe[ex.name] = me;
      if (dam && (!prDam[ex.name] || dam > prDam[ex.name])) prDam[ex.name] = dam;
    });
  });

  const allEx = [...new Set([...Object.keys(prMe), ...Object.keys(prDam)])];

  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-num" style="color:var(--text)">${sessions.length}</div>
        <div class="stat-label">Sesiones</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" style="color:var(--text)">${total}</div>
        <div class="stat-label">Ejercicios comparados</div>
      </div>
      <div class="stat-box me">
        <div class="stat-num">${meWins}</div>
        <div class="stat-label">Victorias Yo</div>
      </div>
      <div class="stat-box dam" style="--stat-color:var(--dam)">
        <div class="stat-num" style="color:var(--dam)">${damWins}</div>
        <div class="stat-label">Victorias Damián</div>
      </div>
    </div>

    <div class="card" style="margin-top:1rem">
      <div class="card-header">
        <span class="card-title">Récords personales (kg máx.)</span>
      </div>
      <table class="pr-table">
        <thead>
          <tr>
            <th>Ejercicio</th>
            <th style="color:var(--me)">Yo</th>
            <th style="color:var(--dam)">Damián</th>
          </tr>
        </thead>
        <tbody>
          ${allEx.map(ex => `
            <tr>
              <td>${ex}</td>
              <td>${prMe[ex] || '-'}</td>
              <td>${prDam[ex] || '-'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    <div class="section-gap"></div>
  `;
}

init();
</script>
</body>
</html>
